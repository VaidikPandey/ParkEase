server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    lazy-initialization: true
  cloud:
    gateway:
      httpclient:
        connect-timeout: 30000
        response-timeout: 60s
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "${CORS_ALLOWED_ORIGIN:http://localhost:4200}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/admin/**,/api/v1/users/**,/oauth2/**,/login/oauth2/**

        - id: parking-service
          uri: lb://parking-service
          predicates:
            - Path=/api/v1/parking/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - name: CircuitBreaker
              args:
                name: analytics
                fallbackUri: forward:/fallback/analytics

        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /api-docs

        - id: parking-service-docs
          uri: lb://parking-service
          predicates:
            - Path=/v3/api-docs/parking
          filters:
            - RewritePath=/v3/api-docs/parking, /api-docs

        - id: booking-service-docs
          uri: lb://booking-service
          predicates:
            - Path=/v3/api-docs/booking
          filters:
            - RewritePath=/v3/api-docs/booking, /api-docs

        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/v3/api-docs/payment
          filters:
            - RewritePath=/v3/api-docs/payment, /api-docs

        - id: notification-service-docs
          uri: lb://notification-service
          predicates:
            - Path=/v3/api-docs/notification
          filters:
            - RewritePath=/v3/api-docs/notification, /api-docs

        - id: analytics-service-docs
          uri: lb://analytics-service
          predicates:
            - Path=/v3/api-docs/analytics
          filters:
            - RewritePath=/v3/api-docs/analytics, /api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /v3/api-docs/auth
      - name: parking-service
        url: /v3/api-docs/parking
      - name: booking-service
        url: /v3/api-docs/booking
      - name: payment-service
        url: /v3/api-docs/payment
      - name: notification-service
        url: /v3/api-docs/notification
      - name: analytics-service
        url: /v3/api-docs/analytics

jwt:
  secret: ${JWT_SECRET:MySuperLongJwtSecretKeyForLocalDevelopmentOnly2026MakeItAtLeast64CharsLong!}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      analytics:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info
