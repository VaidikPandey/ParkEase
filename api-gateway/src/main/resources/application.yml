server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    lazy-initialization: true
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**,/api/v1/admin/**,/oauth2/**,/login/oauth2/**

        - id: parking-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/parking/**

        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/bookings/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**

        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/notifications/**

        - id: analytics-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/analytics/**

jwt:
  secret: MySuperLongJwtSecretKeyForLocalDevelopmentOnly2026MakeItAtLeast64CharsLong!

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
