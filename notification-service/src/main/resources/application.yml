server:
  port: 8085

spring:
  application:
    name: notification-service
  main:
    lazy-initialization: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notification_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:rabbitmq}
    password: ${RABBITMQ_PASSWORD:rabbitmq123}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3

mail:
  enabled: ${MAIL_ENABLED:true}

resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM_EMAIL:ParkEase <noreply@parkease.com>}

gateway:
  url: ${GATEWAY_URL:http://localhost:8080}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

jwt:
  secret: ${JWT_SECRET:MySuperLongJwtSecretKeyForLocalDevelopmentOnly2026MakeItAtLeast64CharsLong!}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
