server:
  port: 8085

spring:
  application:
    name: notification-service
  main:
    lazy-initialization: true

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: rabbitmq
    password: rabbitmq123
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3

  mail:
    host: smtp.gmail.com
    port: 587
    username: noreply@parkease.com
    password: changeme
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mail:
  enabled: false
  from: noreply@parkease.com

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

jwt:
  secret: MySuperLongJwtSecretKeyForLocalDevelopmentOnly2026MakeItAtLeast64CharsLong!

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
