version: '3.9'

services:

  auth-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: parkease-auth
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./auth-service/target/auth-service.jar:/app/auth-service.jar
    command: >
      java -Xmx384m -Xms256m
      -Dspring.main.lazy-initialization=true
      -jar auth-service.jar
    ports:
      - "8081:8081"
    env_file: .env
    depends_on:
      - postgres
      - redis
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 512m

