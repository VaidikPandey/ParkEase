version: '3.9'

x-eureka-env: &eureka-env
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

x-rabbit-env: &rabbit-env
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: rabbitmq
  SPRING_RABBITMQ_PASSWORD: rabbitmq123

x-redis-env: &redis-env
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_DATA_REDIS_PASSWORD: redis123

x-pg-env: &pg-env
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: postgres

services:

  auth-service:
    build: ./auth-service
    container_name: parkease-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      <<: [*eureka-env, *redis-env, *pg-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-changeme}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECTURI: http://localhost:8080/oauth2/callback/google
    depends_on:
      - postgres
      - redis
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 320m

  parking-service:
    build: ./parking-service
    container_name: parkease-parking
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      <<: [*eureka-env, *redis-env, *rabbit-env, *pg-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/parking_db
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 320m

  booking-service:
    build: ./booking-service
    container_name: parkease-booking
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      <<: [*eureka-env, *redis-env, *rabbit-env, *pg-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/booking_db
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 320m

  payment-service:
    build: ./payment-service
    container_name: parkease-payment
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      <<: [*eureka-env, *rabbit-env, *pg-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 256m

  notification-service:
    build: ./notification-service
    container_name: parkease-notification
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      <<: [*eureka-env, *rabbit-env, *pg-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 224m

  analytics-service:
    build: ./analytics-service
    container_name: parkease-analytics
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      <<: [*eureka-env, *rabbit-env, *pg-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/analytics_db
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 224m

  api-gateway:
    build: ./api-gateway
    container_name: parkease-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      <<: *eureka-env
      SPRING_CLOUD_LOADBALANCER_CACHE_TTL: 5s
    depends_on:
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 256m
