name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - auth-service
          - parking-service
          - booking-service
          - payment-service
          - notification-service
          - analytics-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & test ${{ matrix.service }}
        run: mvn -f ${{ matrix.service }}/pom.xml verify -q

  deploy:
    name: Deploy to Render
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy API Gateway
        env:
          HOOK: ${{ secrets.RENDER_HOOK_API_GATEWAY }}
        run: |
          if [ -n "$HOOK" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            echo "api-gateway deploy triggered: $STATUS"
          else
            echo "RENDER_HOOK_API_GATEWAY not set — skipping"
          fi

      - name: Deploy Auth Service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_AUTH }}
        run: |
          if [ -n "$HOOK" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            echo "auth-service deploy triggered: $STATUS"
          else
            echo "RENDER_HOOK_AUTH not set — skipping"
          fi

      - name: Deploy Parking Service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_PARKING }}
        run: |
          if [ -n "$HOOK" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            echo "parking-service deploy triggered: $STATUS"
          else
            echo "RENDER_HOOK_PARKING not set — skipping"
          fi

      - name: Deploy Booking Service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_BOOKING }}
        run: |
          if [ -n "$HOOK" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            echo "booking-service deploy triggered: $STATUS"
          else
            echo "RENDER_HOOK_BOOKING not set — skipping"
          fi

      - name: Deploy Payment Service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_PAYMENT }}
        run: |
          if [ -n "$HOOK" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            echo "payment-service deploy triggered: $STATUS"
          else
            echo "RENDER_HOOK_PAYMENT not set — skipping"
          fi

      - name: Deploy Notification Service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_NOTIFICATION }}
        run: |
          if [ -n "$HOOK" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            echo "notification-service deploy triggered: $STATUS"
          else
            echo "RENDER_HOOK_NOTIFICATION not set — skipping"
          fi

      - name: Deploy Analytics Service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_ANALYTICS }}
        run: |
          if [ -n "$HOOK" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            echo "analytics-service deploy triggered: $STATUS"
          else
            echo "RENDER_HOOK_ANALYTICS not set — skipping"
          fi
