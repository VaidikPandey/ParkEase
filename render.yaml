databases:
  - name: parkease-postgres
    databaseName: parkease
    user: parkease
    plan: free

envVarGroups:
  - name: parkease-jwt
    envVars:
      - key: JWT_SECRET
        sync: false

  - name: parkease-redis
    envVars:
      - key: SPRING_DATA_REDIS_HOST
        sync: false
      - key: SPRING_DATA_REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false

  - name: parkease-rabbitmq
    envVars:
      - key: SPRING_RABBITMQ_HOST
        sync: false
      - key: SPRING_RABBITMQ_PORT
        value: "5671"
      - key: SPRING_RABBITMQ_SSL_ENABLED
        value: "true"
      - key: SPRING_RABBITMQ_VIRTUAL_HOST
        sync: false
      - key: RABBITMQ_USER
        sync: false
      - key: RABBITMQ_PASSWORD
        sync: false

services:
  # ── API Gateway ────────────────────────────────────────────────────────────
  - type: web
    name: parkease-api-gateway
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - fromGroup: parkease-jwt
      - key: AUTH_SERVICE_URL
        value: "https://parkease-auth-by3o.onrender.com"
      - key: PARKING_SERVICE_URL
        sync: false
      - key: BOOKING_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        sync: false
      - key: ANALYTICS_SERVICE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGIN
        value: "https://parkease-frontend-zeta.vercel.app"

  # ── Auth Service ───────────────────────────────────────────────────────────
  - type: web
    name: parkease-auth
    runtime: docker
    dockerfilePath: ./auth-service/Dockerfile
    dockerContext: ./auth-service
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8081"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: POSTGRES_USER
        fromDatabase:
          name: parkease-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: parkease-postgres
          property: password
      - fromGroup: parkease-jwt
      - fromGroup: parkease-redis
      - key: JWT_EXPIRY_MS
        value: "86400000"
      - key: JWT_REFRESH_EXPIRY_MS
        value: "604800000"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: "https://parkease-frontend-zeta.vercel.app"
      - key: ADMIN_EMAIL
        value: "pandeyvaidik04@gmail.com"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"

  # ── Parking Service ────────────────────────────────────────────────────────
  - type: web
    name: parkease-parking
    runtime: docker
    dockerfilePath: ./parking-service/Dockerfile
    dockerContext: ./parking-service
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8082"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: POSTGRES_USER
        fromDatabase:
          name: parkease-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: parkease-postgres
          property: password
      - fromGroup: parkease-jwt
      - fromGroup: parkease-redis
      - fromGroup: parkease-rabbitmq
      - key: EUREKA_CLIENT_ENABLED
        value: "false"

  # ── Booking Service ────────────────────────────────────────────────────────
  - type: web
    name: parkease-booking
    runtime: docker
    dockerfilePath: ./booking-service/Dockerfile
    dockerContext: ./booking-service
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8083"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: POSTGRES_USER
        fromDatabase:
          name: parkease-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: parkease-postgres
          property: password
      - fromGroup: parkease-jwt
      - fromGroup: parkease-redis
      - fromGroup: parkease-rabbitmq
      - key: EUREKA_CLIENT_ENABLED
        value: "false"

  # ── Payment Service ────────────────────────────────────────────────────────
  - type: web
    name: parkease-payment
    runtime: docker
    dockerfilePath: ./payment-service/Dockerfile
    dockerContext: ./payment-service
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8084"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: POSTGRES_USER
        fromDatabase:
          name: parkease-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: parkease-postgres
          property: password
      - fromGroup: parkease-jwt
      - fromGroup: parkease-rabbitmq
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EUREKA_CLIENT_ENABLED
        value: "false"

  # ── Notification Service ───────────────────────────────────────────────────
  - type: web
    name: parkease-notification
    runtime: docker
    dockerfilePath: ./notification-service/Dockerfile
    dockerContext: ./notification-service
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8085"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: POSTGRES_USER
        fromDatabase:
          name: parkease-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: parkease-postgres
          property: password
      - fromGroup: parkease-jwt
      - fromGroup: parkease-rabbitmq
      - key: MAIL_USERNAME
        value: "pandeyvaidik04@gmail.com"
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: "pandeyvaidik04@gmail.com"
      - key: MAIL_ENABLED
        value: "true"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"

  # ── Analytics Service ──────────────────────────────────────────────────────
  - type: web
    name: parkease-analytics
    runtime: docker
    dockerfilePath: ./analytics-service/Dockerfile
    dockerContext: ./analytics-service
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8086"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: POSTGRES_USER
        fromDatabase:
          name: parkease-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: parkease-postgres
          property: password
      - fromGroup: parkease-jwt
      - fromGroup: parkease-rabbitmq
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
